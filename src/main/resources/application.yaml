spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  application:
    name: gestao-vagas

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  devtools:
    add-properties: false

#  datasource:
#    url: jdbc:postgresql://localhost:5432/gestao_vagas
#    username: admin
#    password: admin


logging:
  level:
    org.hibernate.sql: DEBUG
    org.hibernate.tool.hbm2ddl: DEBUG

security:
  token:
    secret_company: JAVAGAS_@123#
    secret_candidate: JAVAGAS_@123#CANDIDATE

management:
  endpoints:
    web:
      exposure:
        include: "health, metrics, prometheus"
  endpoint:
    health:
      show-details: always
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true

# Configurações de Ferramentas / Integrações
